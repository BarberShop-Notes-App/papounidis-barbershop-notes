<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Papounidis--Appointments</title>

    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f1112" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="top">
        <div class="brand">
          <div>
            <div id="appTitle" class="title">Papounidis--BarberShop</div>
            <div class="subtitle" id="subtitle">Barbershop notes</div>
          </div>
        </div>
        <div class="actions">
          <button id="langToggle" class="btn subtle" aria-pressed="false">
            Ελληνικά
          </button>
          <button id="menuBtn" class="icon-btn hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </header>

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <strong id="weeklyCount">0</strong>
          <span>This week</span>
        </div>
        <div class="stat-item">
          <strong id="monthlyCount">0</strong>
          <span>This month</span>
        </div>
      </div>

      <main class="content">
        <section class="calendar-card card" id="calendarSection">
          <div class="cal-header">
            <button id="prevMonth" class="icon-btn" aria-label="Previous month">
              ‹
            </button>
            <div id="monthLabel" class="month-label"></div>
            <button id="nextMonth" class="icon-btn" aria-label="Next month">
              ›
            </button>
          </div>

          <div class="weekday-row" role="presentation"></div>

          <div
            id="calendarGrid"
            class="calendar-grid"
            role="grid"
            aria-label="Calendar"
          ></div>
        </section>

        <section
          class="slots-card card"
          id="slotsSection"
          style="display: none"
        >
          <div class="slots-header">
            <button id="backToCalendarBtn" class="btn ghost">
              ‹ <span>Back</span>
            </button>
            <div id="selectedLabel">Select a date</div>
          </div>
          <div id="slotsContainer" class="slots-grid" aria-live="polite"></div>
        </section>
      </main>

      <footer class="bottom"></footer>
    </div>

    <!-- Side Drawer -->
    <div id="drawerOverlay" class="drawer-overlay"></div>
    <nav id="drawer" class="drawer" aria-label="Settings menu">
      <div class="drawer-header">
        <span class="drawer-title">Menu</span>
        <button id="drawerCloseBtn" class="icon-btn" aria-label="Close menu">
          ✕
        </button>
      </div>
      <div class="drawer-body">
        <button id="exportBtn" class="drawer-item">
          <span class="drawer-icon">↓</span>
          <div>
            <div class="drawer-item-label">Export backup</div>
            <div class="drawer-item-sub">Download reservation data</div>
          </div>
        </button>

        <input
          id="importFileInput"
          type="file"
          accept=".json"
          style="display: none"
          aria-label="Import backup"
        />
        <button id="importBtn" class="drawer-item">
          <span class="drawer-icon">↑</span>
          <div>
            <div class="drawer-item-label">Import backup</div>
            <div class="drawer-item-sub">
              Restore reservation data from a .json
            </div>
          </div>
        </button>

        <div class="drawer-divider"></div>

        <button id="clearBtn" class="drawer-item danger">
          <span class="drawer-icon">✕</span>
          <div>
            <div class="drawer-item-label">Clear all bookings</div>
            <div class="drawer-item-sub">This cannot be undone</div>
          </div>
        </button>
      </div>
    </nav>

    <div
      id="modal"
      class="modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-card">
        <h3 id="modalTitle">Book appointment</h3>

        <div class="modal-body">
          <label id="lblClient">Client name</label>
          <input
            id="inputName"
            type="text"
            maxlength="80"
            autocomplete="name"
          />

          <label id="lblPhone">Phone</label>
          <input id="inputPhone" type="tel" maxlength="30" inputmode="tel" />
        </div>

        <div class="modal-actions">
          <button id="deleteBtn" class="btn ghost danger" style="display: none">
            Delete
          </button>
          <div class="spacer"></div>
          <button id="cancelBtn" class="btn subtle">Cancel</button>
          <button id="saveBtn" class="btn primary">Save</button>
        </div>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
